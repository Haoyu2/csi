version: '3.8'

services:
  dnn_model:
    image: widar3-dnn-model:latest
    container_name: widar3_dnn_container
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      # Mount the project folder containing the source code
      - .:/app
      # Mount the data folder, which can be overridden via DATA_DIR environment variable
      - ${DATA_DIR:-./Data}:/app/Data
    environment:
      # Pass through any environment variables if needed
      - PYTHONUNBUFFERED=1
